{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'styles/style.css' %}">
</head>
<body>
    <div class="container" id="container">

        <!-- login -->
        <div class="form-box etudiant">
            <form method="POST">  
                {% csrf_token %}  
                <input type="hidden" name="form_type" value="login">  
                <h1>Login</h1>
                {{ loginForm.as_p }}
                <button type="submit" class="btn">Login</button>
            </form>
        </div>

        <!-- register -->
        <div class="form-box professeur">
            <form method="POST">  
                {% csrf_token %}  
                <input type="hidden" name="form_type" value="register">  
                <h1>Register</h1>
                {{ registerForm.as_p }}
                <button type="submit" class="btn">Register</button>
            </form>
        </div>

        <!-- toggle box -->
        <div class="toggle-box">
            <div class="toggle-pannel left">
                <h1>Login</h1>
                <p>Vous avez pas de compte ?</p>
                <button class="btn professeur-btn">Sign up</button>
            </div>
            <div class="toggle-pannel right">
                <h1>Register</h1>
                <p>Vous avez un compte ?</p>
                <button class="btn etudiant-btn">Log in</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.querySelector('.container');
        const profBtn = document.querySelector('.professeur-btn');
        const etuBtn = document.querySelector('.etudiant-btn');

        profBtn.addEventListener('click', () => container.classList.add('active'));
        etuBtn.addEventListener('click', () => container.classList.remove('active'));
    </script>
</body>
</html>
